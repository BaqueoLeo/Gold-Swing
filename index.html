<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>XAU/USD — Scalp & Swing Command Center</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06090f">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06090f;--card:#0c1219;--border:#151e2d;--text:#b8c5d8;--dim:#4a5a72;--accent:#c9a84c;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b;--purple:#a855f7;--cyan:#06b6d4}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Menlo','Fira Code',monospace;font-size:12px;max-width:460px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
#setup h1{font-size:14px;color:var(--accent);letter-spacing:3px;margin-bottom:4px}
#setup .sub{font-size:10px;color:var(--dim);margin-bottom:32px}
#setup input{width:100%;max-width:340px;padding:14px 16px;background:#0a1020;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;margin-bottom:12px;outline:none}
#setup input:focus{border-color:var(--accent)}
#setup button{width:100%;max-width:340px;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b6914);color:#000;font-family:inherit;font-size:12px;font-weight:800;letter-spacing:1px;cursor:pointer}
#setup .note{font-size:8px;color:var(--dim);margin-top:16px;max-width:320px;line-height:1.5}
#app{display:none;padding-bottom:80px}
.hdr{padding:14px 14px 10px;background:linear-gradient(180deg,#0a1020,var(--bg));border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.pair{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pl{color:var(--accent);font-size:10px;font-weight:800;letter-spacing:2px}
.b{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700}
.bd{background:#111827;color:#94a3b8;border:1px solid #1e293b}
.by{background:#422006;color:#fbbf24;border:1px solid #78350f}
.bg{background:#052e16;color:#4ade80;border:1px solid #14532d}
.br{background:#350a0a;color:#f87171;border:1px solid #7f1d1d}
.bc{background:#083344;color:#22d3ee;border:1px solid #155e75}
.bp{background:#2e1065;color:#c084fc;border:1px solid #4c1d95}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dl{background:var(--green);box-shadow:0 0 6px var(--green)}.dw{background:var(--orange)}
.price{font-size:26px;font-weight:800;color:#fff;margin-top:4px}
.chg{font-size:11px;margin-top:2px}.meta{font-size:8px;color:var(--dim)}
.tabs{display:flex;gap:3px;margin-top:10px}
.tabs button{flex:1;padding:6px 2px;border-radius:6px;border:none;cursor:pointer;background:0;color:var(--dim);font-size:8px;font-weight:700;letter-spacing:.8px;font-family:inherit;border-bottom:2px solid transparent}
.tabs button.on{background:rgba(201,168,76,.13);color:var(--accent);border-bottom-color:var(--accent)}
.ct{padding:10px 12px}
.cd{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.cl{font-size:9px;color:var(--dim);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.cw{position:relative;height:70px;background:#080d15;border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}
.ctl{font-size:9px;color:var(--dim);letter-spacing:1.5px;font-weight:600;margin-bottom:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.ce{padding:8px;background:#080d15;border-radius:6px}
.cvl{font-size:8px;color:var(--dim)}.cv{font-size:14px;font-weight:700}.cvx{font-size:16px;font-weight:800}
.tc{text-align:center}
.pb{height:6px;background:#111827;border-radius:3px;overflow:hidden;margin:3px 0}
.pf{height:100%;border-radius:3px;transition:width .5s}
.zr{display:flex;justify-content:space-between;padding:4px 8px;border-radius:4px;margin-bottom:3px}
.ni{border-left:3px solid var(--orange);padding:10px;margin-bottom:8px;border-radius:0 12px 12px 0;background:var(--card);border-right:1px solid var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.ni.pos{border-left-color:var(--green)}.ni.neg{border-left-color:var(--red)}
.btn{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#8b6914);color:#000;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:1px;margin-bottom:12px}
.btn:disabled{background:var(--border);color:var(--dim);cursor:not-allowed}
.pp{margin-bottom:16px}
.ps{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:4px;background:var(--card);border:1px solid var(--border)}
.ps.a{border-color:var(--accent);background:#0f1520}.ps.d{border-color:var(--green);background:#052e1611}.ps.e{border-color:var(--red);background:#350a0a11}.ps.r{border-color:var(--orange);background:#42200611}
.pi{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.pi.p{background:#111827;color:var(--dim)}.pi.a{background:var(--accent);color:#000}.pi.d{background:var(--green);color:#fff}.pi.e{background:var(--red);color:#fff}.pi.r{background:var(--orange);color:#000}
.pn{font-size:10px;font-weight:700}.pst{font-size:8px;color:var(--dim);margin-top:1px}
.lr{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;margin-bottom:3px;border-radius:4px}
.cat{font-size:10px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border)}
.disc{padding:12px 16px;text-align:center;font-size:8px;color:var(--dim);line-height:1.4}
.emp{text-align:center;padding:40px 20px;color:var(--dim)}
.sd{display:flex;align-items:center;gap:8px;margin:16px 0 10px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.sd::before,.sd::after{content:'';flex:1;height:1px;background:var(--border)}
@keyframes spin{to{transform:rotate(360deg)}}.sp{animation:spin 1s linear infinite;display:inline-block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fadeIn .3s ease-out}

/* Paper Trading */
.trade-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;margin-bottom:4px;background:var(--card);border:1px solid var(--border);font-size:10px}
.trade-row.open{border-left:3px solid var(--blue)}
.trade-row.win{border-left:3px solid var(--green)}
.trade-row.loss{border-left:3px solid var(--red)}
.pnl-pos{color:var(--green);font-weight:700}
.pnl-neg{color:var(--red);font-weight:700}
.equity-bar{height:8px;background:#111827;border-radius:4px;overflow:hidden;margin:6px 0}
.equity-fill{height:100%;border-radius:4px;transition:width .5s}

/* Chat Bubble */
#chatBubble{position:fixed;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b6914);display:flex;align-items:center;justify-content:center;cursor:grab;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5);font-size:20px;user-select:none;touch-action:none;bottom:20px;right:16px}
#chatBubble:active{cursor:grabbing}
#chatBubble .unread{position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:var(--red);border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
#chatPanel{position:fixed;bottom:80px;right:12px;width:calc(100vw - 24px);max-width:400px;max-height:60vh;background:var(--card);border:1px solid var(--border);border-radius:16px;z-index:9998;display:none;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#chatPanel.open{display:flex}
#chatHead{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#chatHead span{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px}
#chatHead button{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer}
#chatMsgs{flex:1;overflow-y:auto;padding:10px;min-height:200px;max-height:calc(60vh - 110px)}
.msg{margin-bottom:8px;padding:8px 10px;border-radius:10px;font-size:11px;line-height:1.4;max-width:90%}
.msg.user{background:#1a2030;margin-left:auto;border-bottom-right-radius:2px;color:var(--text)}
.msg.ai{background:#0d1520;border:1px solid var(--border);border-bottom-left-radius:2px;color:var(--text)}
.msg.sys{background:transparent;color:var(--dim);font-size:9px;text-align:center;max-width:100%}
#chatInput{display:flex;border-top:1px solid var(--border);padding:8px}
#chatInput input{flex:1;background:#080d15;border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:inherit;font-size:12px;outline:none}
#chatInput input:focus{border-color:var(--accent)}
#chatInput button{margin-left:6px;padding:10px 14px;background:var(--accent);border:none;border-radius:8px;color:#000;font-weight:800;font-family:inherit;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div id="setup">
  <div style="font-size:36px;margin-bottom:16px">⚡</div>
  <h1>XAU/USD COMMAND CENTER</h1>
  <div class="sub">SCALP & SWING — PAPER TRADING</div>
  <input id="tdKey" type="text" placeholder="TwelveData API Key" autocomplete="off">
  <input id="aiKey" type="password" placeholder="Anthropic API Key (sk-ant-...)" autocomplete="off">
  <input id="bvKey" type="password" placeholder="Brave Search API Key (opcional)" autocomplete="off">
  <button onclick="initApp()">INICIAR COMMAND CENTER</button>
  <div class="note">TwelveData y Anthropic requeridas. Brave es opcional pero recomendada para noticias más rápidas. Keys en localStorage.</div>
</div>

<div id="app">
  <div class="hdr">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div class="pair"><span class="pl">XAU/USD</span><span class="b bc">SCALP</span><span class="b bp">SWING</span><span class="b by">PAPER</span><span class="dot" id="sDot"></span><span id="sTxt" style="font-size:7px"></span></div>
        <div class="price" id="pM">—</div>
        <div class="chg" id="cI"></div>
      </div>
      <div style="text-align:right"><div class="meta">XM 500:1</div><div class="meta" id="lU"></div></div>
    </div>
    <div class="tabs" id="tB"><button class="on" data-tab="ov">OVERVIEW</button><button data-tab="te">TÉCNICO</button><button data-tab="ai">AI PLAN</button><button data-tab="pt">PAPER💰</button><button data-tab="nw">NEWS</button></div>
  </div>
  <div class="ct" id="ct"></div>
  <div class="disc">⚠️ Paper trading. No es dinero real. No es asesoría financiera.</div>
</div>

<!-- CHAT BUBBLE -->
<div id="chatBubble" onclick="toggleChat()" style="display:none">💬</div>
<div id="chatPanel">
  <div id="chatHead"><span>🤖 AI ASSISTANT</span><button onclick="toggleChat()">✕</button></div>
  <div id="chatMsgs"></div>
  <div id="chatInput"><input id="chatIn" placeholder="Escribe..." onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">→</button></div>
</div>

<script>
// ═══ STATE ═══
const S={tdKey:'',aiKey:'',bvKey:'',gold:null,q:null,st:'wait',c5m:[],c15m:[],c1h:[],c4h:[],cD:[],cW:[],corr:{btc:null,oil:null},tab:'ov',plan:null,loading:false,err:null,news:[],lu:null,
pp:{running:false,ph:[
{id:'quote',n:'Precio XAU/USD',s:'p',r:0,mx:5},
{id:'c5m',n:'Velas 5M',s:'p',r:0,mx:5},{id:'c15m',n:'Velas 15M',s:'p',r:0,mx:5},
{id:'c1h',n:'Velas 1H',s:'p',r:0,mx:5},{id:'c4h',n:'Velas 4H',s:'p',r:0,mx:5},
{id:'cD',n:'Velas Daily',s:'p',r:0,mx:5},{id:'cW',n:'Velas Weekly',s:'p',r:0,mx:5},
{id:'corr',n:'Correlaciones',s:'p',r:0,mx:5},
{id:'news',n:'Noticias',s:'p',r:0,mx:4},
{id:'plan',n:'Plan IA',s:'p',r:0,mx:10},
{id:'paper',n:'Paper Trading',s:'p',r:0,mx:3}
],cp:0},
// Paper Trading
paper:{balance:100,equity:100,trades:[],openTrades:[]},
// Chat
chat:{open:false,msgs:[],loading:false}
};

// Load paper state
try{const pt=JSON.parse(localStorage.getItem('xau_paper'));if(pt)S.paper=pt}catch{}

let Q=[],BY=false;
function enq(u,cb){Q.push({u,cb})}setInterval(()=>{if(BY||!Q.length)return;BY=true;const{u,cb}=Q.shift();fetch(u).then(r=>r.json()).then(d=>cb(d)).catch(()=>cb(null)).finally(()=>setTimeout(()=>BY=false,8500))},1200);
const TD=e=>`https://api.twelvedata.com/${e}&apikey=${S.tdKey}`;
const fC=n=>n?`$${n.toFixed(2)}`:'—';const tP=(a,b)=>Math.abs(a-b)*10;
const pC=d=>d&&d.values?d.values.reverse().map(v=>({t:new Date(v.datetime).getTime(),o:+v.open,h:+v.high,l:+v.low,c:+v.close})):null;

// ═══ TECHNICALS ═══
function RSI(c,p=14){if(c.length<p+1)return null;let g=0,l=0;for(let i=c.length-p;i<c.length;i++){const d=c[i].c-c[i-1].c;d>0?g+=d:l-=d}const a=g/p,b=l/p;return b===0?100:100-100/(1+a/b)}
function EMA(d,p){const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e}
function MACD(c){if(c.length<26)return null;const p=c.map(x=>x.c),m=EMA(p,12)-EMA(p,26),s=EMA(p.slice(-9),9)-EMA(p.slice(-26),26);return{m,s,h:m-s*.7}}
function ATR(c,p=14){if(c.length<p+1)return null;let s=0;for(let i=c.length-p;i<c.length;i++)s+=Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c));return s/p}
function BB(c,p=20){if(c.length<p)return null;const sl=c.slice(-p).map(c=>c.c),m=sl.reduce((a,b)=>a+b,0)/p,sd=Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/p);return{u:m+2*sd,m,l:m-2*sd,w:(4*sd/m)*100}}
function STOCH(c,p=14){if(c.length<p)return null;const sl=c.slice(-p),h=Math.max(...sl.map(c=>c.h)),l=Math.min(...sl.map(c=>c.l));return h===l?50:((sl[sl.length-1].c-l)/(h-l))*100}
function SR(c){if(c.length<10)return{S:[],R:[]};const mn=Math.min(...c.map(c=>c.l)),mx=Math.max(...c.map(c=>c.h)),r=mx-mn;return{S:[mn+r*.05,mn+r*.236,mn+r*.382],R:[mn+r*.618,mn+r*.786,mn+r*.95]}}
function SZ(c){if(c.length<20)return{d:[],s:[]};const d=[],s=[];for(let i=2;i<c.length-2;i++){if(c[i].l<c[i-1].l&&c[i].l<c[i-2].l&&c[i].l<c[i+1].l&&c[i].l<c[i+2].l)d.push({p:c[i].l,st:c[i+1].c>c[i].h?2:1});if(c[i].h>c[i-1].h&&c[i].h>c[i-2].h&&c[i].h>c[i+1].h&&c[i].h>c[i+2].h)s.push({p:c[i].h,st:c[i+1].c<c[i].l?2:1})}return{d:d.slice(-4),s:s.slice(-4)}}
function VWAP(c){if(c.length<10)return null;let cm=0,cv=0;c.slice(-20).forEach(x=>{const tp=(x.h+x.l+x.c)/3,v=x.h-x.l;cm+=tp*v;cv+=v});return cv>0?cm/cv:null}

// ═══ INIT ═══
function initApp(){const k=document.getElementById('tdKey').value.trim(),a=document.getElementById('aiKey').value.trim(),b=document.getElementById('bvKey').value.trim();if(!k||!a){alert('Necesitas TwelveData y Anthropic keys');return}S.tdKey=k;S.aiKey=a;S.bvKey=b;localStorage.setItem('td_key',k);localStorage.setItem('ai_key',a);if(b)localStorage.setItem('bv_key',b);document.getElementById('setup').style.display='none';document.getElementById('app').style.display='block';document.getElementById('chatBubble').style.display='flex';setupTabs();R();setInterval(()=>{if(!S.pp.running){enq(TD('price?symbol=XAU/USD'),d=>{if(d?.price){S.gold=+d.price;S.st='live';S.lu=new Date();updateOpenTrades();R()}})}},30000)}
window.addEventListener('DOMContentLoaded',()=>{const k=localStorage.getItem('td_key');if(k)document.getElementById('tdKey').value=k;const a=localStorage.getItem('ai_key');if(a)document.getElementById('aiKey').value=a;const b=localStorage.getItem('bv_key');if(b)document.getElementById('bvKey').value=b});
function setupTabs(){document.querySelectorAll('#tB button').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;document.querySelectorAll('#tB button').forEach(x=>x.classList.remove('on'));b.classList.add('on');R()}))}
async function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ═══ MEMORY ═══
function savePlan(plan,px){try{const m=JSON.parse(localStorage.getItem('xau_memory')||'[]');m.push({ts:new Date().toISOString(),px,bias:plan.overall_bias,str:plan.bias_strength,conf:plan.confidence,phase:plan.market_phase,act:plan.immediate_action,sc:plan.scalp_plan?.active?{d:plan.scalp_plan.direction,e:plan.scalp_plan.entry_price,sl:plan.scalp_plan.stop_loss,t1:plan.scalp_plan.tp1}:null,sw:plan.swing_plan?.active?{d:plan.swing_plan.direction,ez:plan.swing_plan.entry_zone,sl:plan.swing_plan.stop_loss,t1:plan.swing_plan.tp1,t3:plan.swing_plan.tp3}:null,inv:(plan.invalidation||'').slice(0,80)});while(m.length>20)m.shift();localStorage.setItem('xau_memory',JSON.stringify(m))}catch{}}
function loadMem(){try{return JSON.parse(localStorage.getItem('xau_memory')||'[]')}catch{return[]}}
function memCtx(){const m=loadMem();if(!m.length)return'\n=MEM= Primera ejecución.';const r=m.slice(-5);let c=`\n=MEM (${m.length} planes, últimos ${r.length})=\nRevisa bias previos. Si incorrecto, ajusta. Si correcto, mantén.\n`;r.forEach(x=>{const age=Math.round((Date.now()-new Date(x.ts).getTime())/60000);const a=age<60?age+'m':age<1440?Math.round(age/60)+'h':Math.round(age/1440)+'d';c+=`[${a}] $${x.px?.toFixed(2)} ${x.bias}(${x.str}/10) ${x.act}`;if(x.sc)c+=` Sc:${x.sc.d}@${x.sc.e?.toFixed(2)}`;if(x.sw)c+=` Sw:${x.sw.d}@${x.sw.ez?.from?.toFixed(2)}`;c+='\n'});if(r.length>=2){const l=r[r.length-1];const ok=(l.bias==='BULLISH'&&S.gold>l.px)||(l.bias==='BEARISH'&&S.gold<l.px);c+=`Último bias ${l.bias} ${ok?'CORRECTO ✓':'INCORRECTO ✗'}\n`}return c}
function getMemN(){return loadMem().length}
function clearMem(){localStorage.removeItem('xau_memory')}

// ═══ PAPER TRADING ENGINE ═══
function savePaper(){localStorage.setItem('xau_paper',JSON.stringify(S.paper))}
function openTrade(dir,lot,entry,sl,tp1,tp2,type){
  const t={id:Date.now(),ts:new Date().toISOString(),type,dir,lot,entry,sl,tp1,tp2:tp2||null,status:'open',pnl:0,closePrice:null,closedAt:null};
  S.paper.openTrades.push(t);savePaper();addChatMsg('sys',`📊 ${type.toUpperCase()} ${dir} abierto: ${lot} lots @ ${fC(entry)} | SL:${fC(sl)} TP1:${fC(tp1)}`);R()
}
function closeTrade(id,reason,price){
  const idx=S.paper.openTrades.findIndex(t=>t.id===id);if(idx===-1)return;
  const t=S.paper.openTrades.splice(idx,1)[0];
  const px=price||S.gold;t.closePrice=px;t.closedAt=new Date().toISOString();t.status=reason;
  // PnL: (close-entry)*10*lot for BUY, (entry-close)*10*lot for SELL. Gold = $10/pip per lot
  const pipDiff=t.dir==='BUY'?(px-t.entry)*10:(t.entry-px)*10;
  t.pnl=pipDiff*t.lot*10; // $10 per pip per lot for XAU
  S.paper.balance+=t.pnl;S.paper.equity=S.paper.balance;
  S.paper.trades.push(t);savePaper();
  const emoji=t.pnl>=0?'✅':'❌';
  addChatMsg('sys',`${emoji} ${t.type} ${t.dir} cerrado (${reason}): ${t.pnl>=0?'+':''}$${t.pnl.toFixed(2)} | Balance: $${S.paper.balance.toFixed(2)}`);R()
}
function updateOpenTrades(){
  if(!S.gold)return;
  S.paper.openTrades.forEach(t=>{
    // Check SL/TP
    if(t.dir==='BUY'){
      if(S.gold<=t.sl)closeTrade(t.id,'SL',t.sl);
      else if(S.gold>=t.tp1)closeTrade(t.id,'TP1',t.tp1);
    }else{
      if(S.gold>=t.sl)closeTrade(t.id,'SL',t.sl);

    }
  });
  // Update floating PnL

}
function autoExecutePlan(){

      openTrade(s.direction,parseFloat((p.risk_management?.scalp_lot||0.03).toFixed(2)),S.gold,s.stop_loss,s.tp1,s.tp2,'scalp');

}

async function cAI(prompt,mt=1500,ws=false){

async function phNews(){
  const extractJSON=txt=>{let c=txt.replace(/```json|```/g,'').trim();const s=c.indexOf('['),e=c.lastIndexOf(']');if(s===-1||e===-1||e<s)return null;const x=c.substring(s,e+1);try{return JSON.parse(x)}catch{}try{return JSON.parse(x.replace(/,(\s*[\]}])/g,'$1'))}catch{}return null;};
  
  // PRIMARY: Brave Search API
  if(S.bvKey){
    try{
      const r=await fetch('https://api.search.brave.com/res/v1/news/search?q=gold+XAUUSD+price+USD+fed+inflation+geopolitics&count=10&freshness=pd',{
        headers:{'X-Subscription-Token':S.bvKey,'Accept':'application/json'}
      });
      if(r.ok){
        const d=await r.json();
        if(d.results?.length){
          const raw=d.results.slice(0,10).map(n=>({
            title:n.title,
            summary:(n.description||'').slice(0,200),
            source:n.profile?.name||n.meta_url?.hostname||'',
            age:n.age||''
          }));
          // Let Claude classify impact/weight in one fast call
          try{
            const t=await cAI(`Classify these gold-market news for XAU/USD. Return ONLY JSON array same order: [{"title":"exact_title","impact":"positive"|"negative"|"neutral","weight":"high"|"medium"|"low","timeframe":"immediate"|"this_week"|"ongoing"}]. Positive=bullish for gold (USD weakness, risk-off, inflation, war, Fed dovish). Negative=bearish (strong USD, risk-on, Fed hawkish). Input: ${JSON.stringify(raw.map(n=>n.title))}`,800,false);
            const cls=extractJSON(t);
            if(Array.isArray(cls)){
              S.news=raw.map((n,i)=>({...n,impact:cls[i]?.impact||'neutral',weight:cls[i]?.weight||'medium',timeframe:cls[i]?.timeframe||'ongoing'}));
              return;
            }
          }catch{}
          // If classification fails, still use raw news with neutral impact
          S.news=raw.map(n=>({...n,impact:'neutral',weight:'medium',timeframe:'ongoing'}));
          return;
        }
      }
    }catch(e){console.warn('Brave failed:',e)}
  }
  
  // FALLBACK 1: Anthropic web search
  try{
    const t=await cAI('Search current news affecting gold XAU/USD. Return ONLY a JSON array: [{"title":"str","impact":"positive"|"negative"|"neutral","summary":"short","weight":"high"|"medium"|"low"}]. Max 8. If nothing found return [].',800,true);
    const p=extractJSON(t);
    if(Array.isArray(p)){S.news=p.filter(n=>n&&n.title).slice(0,10);return}
  }catch(e){if(e.message==='RATE_LIMIT')throw e;}
  
  // FALLBACK 2: Claude knowledge only
  try{
    const t=await cAI('List important current factors affecting gold XAU/USD based on recent market conditions. Return ONLY a JSON array: [{"title":"str","impact":"positive"|"negative"|"neutral","summary":"short","weight":"high"|"medium"|"low"}]. Max 6.',500,false);
    const p=extractJSON(t);
    if(Array.isArray(p)){S.news=p.filter(n=>n&&n.title).slice(0,10);return}
  }catch(e){if(e.message==='RATE_LIMIT')throw e;}
  
  // Never block pipeline
  S.news=[{title:'News feed unavailable',impact:'neutral',summary:'Proceeding with technical analysis only',weight:'low'}];
}

function rOV(){let h='<div class="fi">';h+=`<button class="btn" onclick="runPP()" ${S.pp.running?'disabled':''}>${S.pp.running?'<span class="sp">◌</span> ANALIZANDO...':'⚡ ANALIZAR — SCALP & SWING'}</button>`;if(S.pp.running||S.pp.ph.some(p=>p.s!=='p'))h+=rPPL();if(S.err)h+=`<div class="cd" style="border-color:#ef444444;background:#1a0a0a"><div style="color:var(--red);font-size:11px">❌ ${S.err}</div></div>`;
// Paper summary
h+=`<div class="cd"><div class="cl">PAPER TRADING</div><div class="g3 tc"><div><div class="cvl">Balance</div><div class="cvx" style="color:${S.paper.balance>=100?'var(--green)':'var(--red)'}">$${S.paper.balance.toFixed(2)}</div></div><div><div class="cvl">Equity</div><div class="cvx" style="color:${S.paper.equity>=100?'var(--green)':'var(--red)'}">$${S.paper.equity.toFixed(2)}</div></div><div><div class="cvl">Open</div><div class="cvx" style="color:var(--blue)">${S.paper.openTrades.length}</div></div></div><div class="equity-bar"><div class="equity-fill" style="width:${Math.min(200,Math.max(0,S.paper.equity))}%;background:${S.paper.equity>=100?'var(--green)':'var(--red)'}"></div></div></div>`;
if(S.c5m.length>5){h+='<div class="sd" style="color:var(--cyan)">Scalp</div>';h+=chB(S.c5m.slice(-40),50,'5M','5m')+chB(S.c15m.slice(-40),50,'15M','15m')+chB(S.c1h.slice(-50),60,'1H','1h');h+='<div class="sd" style="color:var(--purple)">Swing</div>';h+=chB(S.c4h.slice(-40),60,'4H','4h')+chB(S.cD.slice(-60),60,'D','d')+chB(S.cW.slice(-30),50,'W','w')}
return h+'</div>'}

// TECHNICALS
function rTE(){if(S.cD.length<10)return'<div class="emp">Ejecuta pipeline</div>';const rb=(l,v)=>`<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--dim)">${l}</span><span style="font-size:12px;font-weight:700;color:${v>70?'var(--red)':v<30?'var(--green)':'var(--text)'}">${v?v.toFixed(1):'—'}</span></div><div class="pb"><div class="pf" style="width:${v||0}%;background:${v>70?'var(--red)':v<30?'var(--green)':'var(--blue)'}"></div></div></div>`;let h='<div class="fi">';h+=`<div class="cd"><div class="cl">RSI</div>${rb('5M',RSI(S.c5m))}${rb('15M',RSI(S.c15m))}${rb('1H',RSI(S.c1h))}${rb('4H',RSI(S.c4h))}${rb('D',RSI(S.cD))}${rb('W',RSI(S.cW))}</div>`;
h+=`<div class="cd"><div class="cl">MACD</div><div class="g4 tc">${[{l:'15M',v:MACD(S.c15m)},{l:'1H',v:MACD(S.c1h)},{l:'4H',v:MACD(S.c4h)},{l:'D',v:MACD(S.cD)}].map(x=>`<div><div class="cvl">${x.l}</div><div class="cv" style="color:var(--${x.v?.h>0?'green':'red'})">${x.v?x.v.h.toFixed(2):'—'}</div></div>`).join('')}</div></div>`;
const z1=SZ(S.c1h),zD=SZ(S.cD);const zC=(l,z)=>`<div class="cd"><div class="cl">ZONAS ${l}</div><div style="margin-bottom:4px"><div style="font-size:9px;color:var(--green);font-weight:700">▼ DEM</div>${z.d.length?z.d.map(x=>`<div class="zr" style="background:#052e1622"><span style="color:var(--green)">${fC(x.p)}</span><span style="font-size:9px;color:var(--dim)">${S.gold?tP(S.gold,x.p).toFixed(0)+'p':''}</span></div>`).join(''):'—'}</div><div><div style="font-size:9px;color:var(--red);font-weight:700">▲ SUP</div>${z.s.length?z.s.map(x=>`<div class="zr" style="background:#350a0a22"><span style="color:var(--red)">${fC(x.p)}</span><span style="font-size:9px;color:var(--dim)">${S.gold?tP(S.gold,x.p).toFixed(0)+'p':''}</span></div>`).join(''):'—'}</div></div>`;
h+=zC('1H',z1)+zC('D',zD);return h+'</div>'}

// AI PLAN
function rAI(){const p=S.plan,bc=b=>b==='BULLISH'?'var(--green)':b==='BEARISH'?'var(--red)':'var(--orange)';let h='<div class="fi">';h+=`<button class="btn" onclick="runPP()" ${S.pp.running?'disabled':''}>${S.pp.running?'<span class="sp">◌</span>...':'⚡ NUEVO ANÁLISIS'}</button>`;
const mc=getMemN();if(mc)h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:6px 10px;background:var(--card);border-radius:8px;border:1px solid var(--border)"><div style="font-size:9px;color:var(--dim)">🧠 Mem: <span style="color:var(--accent)">${mc}</span></div><button onclick="if(confirm('Borrar memoria?')){clearMem();R()}" style="font-size:8px;background:0;border:1px solid var(--border);color:var(--dim);padding:3px 8px;border-radius:4px;cursor:pointer;font-family:inherit">Limpiar</button></div>`;
if(S.pp.running||S.pp.ph.some(x=>x.s!=='p'&&!S.plan))h+=rPPL();if(S.err)h+=`<div class="cd" style="border-color:#ef444444;background:#1a0a0a"><div style="color:var(--red);font-size:11px">❌ ${S.err}</div></div>`;
if(p){
  const ac=p.immediate_action?.includes('BUY')?'var(--green)':p.immediate_action?.includes('SELL')?'var(--red)':'var(--orange)';
  h+=`<div class="cd" style="border:2px solid ${ac};background:${ac}11"><div class="cl" style="color:${ac}">⚡ AHORA</div><div style="font-size:18px;font-weight:800;color:${ac};margin-bottom:4px">${(p.immediate_action||'').replace(/_/g,' ')}</div><div style="font-size:11px;line-height:1.4">${p.immediate_reason||''}</div></div>`;
  h+=`<div class="cd" style="border-color:${bc(p.overall_bias)}33"><div style="display:flex;justify-content:space-between"><div><div style="font-size:20px;font-weight:800;color:${bc(p.overall_bias)}">${p.overall_bias}</div><div style="font-size:9px;color:var(--dim)">${p.bias_strength}/10 · ${p.confidence}%</div></div><div style="text-align:right"><span class="b ${p.market_phase?.includes('up')?'bg':p.market_phase?.includes('down')?'br':'by'}">${(p.market_phase||'').toUpperCase()}</span></div></div></div>`;
  if(p.memory_reflection)h+=`<div class="cd" style="border-left:3px solid var(--accent);background:#18140a"><div class="cl" style="color:var(--accent)">🧠 APRENDIZAJE</div><div style="font-size:10px;line-height:1.4">${p.memory_reflection}</div></div>`;
  if(p.scalp_plan?.active){const s=p.scalp_plan,ib=s.direction==='BUY',tc=ib?'var(--green)':'var(--red)';h+='<div class="sd" style="color:var(--cyan)">⚡ Scalp</div>';h+=`<div class="cd" style="border-left:3px solid var(--cyan)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="font-size:16px;font-weight:800;color:${tc}">${ib?'🟢':'🔴'} ${s.direction}</div><span class="b bc">${s.timeframe||''}</span></div><div class="g2" style="margin-bottom:8px"><div class="ce"><div class="cvl">ENTRY</div><div style="font-size:13px;font-weight:700">${s.entry_type==='wait_for_level'?(s.wait_for||'—'):fC(s.entry_price)}</div></div><div class="ce"><div class="cvl" style="color:var(--red)">SL</div><div style="font-size:13px;font-weight:700;color:var(--red)">${fC(s.stop_loss)} (${s.sl_pips||''}p)</div></div></div><div class="g2" style="margin-bottom:8px">${[{l:'TP1',v:s.tp1,p:s.tp1_pips},{l:'TP2',v:s.tp2,p:s.tp2_pips}].map(x=>`<div class="ce tc"><div class="cvl" style="color:var(--green)">${x.l}</div><div style="font-size:13px;font-weight:700;color:var(--green)">${fC(x.v)}</div><div style="font-size:9px;color:var(--accent)">${x.p?x.p+'p':''}</div></div>`).join('')}</div>${s.trigger?`<div style="font-size:10px;color:var(--cyan)">🎯 ${s.trigger}</div>`:''}<div style="font-size:10px;margin-top:4px">${s.rationale||''}</div></div>`}
  if(p.swing_plan?.active){const sw=p.swing_plan,ib=sw.direction==='BUY',tc=ib?'var(--green)':'var(--red)';h+='<div class="sd" style="color:var(--purple)">🎯 Swing</div>';h+=`<div class="cd" style="border-left:3px solid var(--purple)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="font-size:16px;font-weight:800;color:${tc}">${ib?'🟢':'🔴'} ${sw.direction}</div><span class="b bp">${sw.horizon||''}</span></div><div class="g2" style="margin-bottom:8px"><div class="ce"><div class="cvl">ENTRY</div><div style="font-size:12px;font-weight:700">${fC(sw.entry_zone?.from)}-${fC(sw.entry_zone?.to)}</div></div><div class="ce"><div class="cvl" style="color:var(--red)">SL</div><div style="font-size:12px;font-weight:700;color:var(--red)">${fC(sw.stop_loss)}</div></div></div><div class="g3" style="margin-bottom:8px">${['tp1','tp2','tp3'].map((tp,i)=>`<div class="ce tc"><div class="cvl" style="color:var(--green)">TP${i+1}</div><div style="font-size:12px;font-weight:700;color:var(--green)">${fC(sw[tp])}</div><div style="font-size:9px;color:var(--accent)">${sw[tp+'_pips']?sw[tp+'_pips']+'p':''}</div></div>`).join('')}</div><div style="font-size:10px">${sw.rationale||''}</div></div>`}
  if(p.key_levels?.length){h+=`<div class="cd"><div class="cl">NIVELES</div>`;p.key_levels.forEach(l=>{const bg=l.type==='support'||l.type==='demand'?'#052e1618':l.type==='resistance'||l.type==='supply'?'#350a0a18':'#42200618';h+=`<div class="lr" style="background:${bg}"><span style="font-size:10px">${l.label}${l.importance==='critical'?' 🔴':''}</span><span style="font-size:12px;font-weight:700">${fC(l.price)}</span></div>`});h+='</div>'}
  if(p.risk_management){const r=p.risk_management;h+=`<div class="cd"><div class="cl">RIESGO</div><div class="g2 tc"><div class="ce"><div class="cvl" style="color:var(--cyan)">SCALP</div><div class="cvx" style="color:var(--cyan)">${r.scalp_lot||'0.03'}</div><div style="font-size:8px;color:var(--dim)">$${r.scalp_risk_usd||'?'}</div></div><div class="ce"><div class="cvl" style="color:var(--purple)">SWING</div><div class="cvx" style="color:var(--purple)">${r.swing_lot||'0.05'}</div><div style="font-size:8px;color:var(--dim)">$${r.swing_risk_usd||'?'}</div></div></div></div>`}
  if(p.invalidation)h+=`<div class="cd" style="border-color:#ef444422"><div class="cl" style="color:var(--red)">⚠️ INVALIDACIÓN</div><div style="font-size:11px">${p.invalidation}</div></div>`;
  if(p.upcoming_catalysts?.length){h+=`<div class="cd"><div class="cl">CATALIZADORES</div>`;p.upcoming_catalysts.forEach(c=>h+=`<div class="cat">🔸 ${c}</div>`);h+='</div>'}
}
if(!p&&!S.loading&&!S.err)h+='<div class="emp"><div style="font-size:32px;margin-bottom:12px">⚡</div><div>Presiona para analizar</div></div>';return h+'</div>'}

// PAPER TRADING TAB
function rPT(){let h='<div class="fi">';
const pp=S.paper,wins=pp.trades.filter(t=>t.pnl>0).length,losses=pp.trades.filter(t=>t.pnl<=0).length,total=pp.trades.reduce((a,t)=>a+t.pnl,0);
h+=`<div class="cd"><div class="cl">💰 PAPER ACCOUNT</div><div class="g3 tc" style="margin-bottom:8px"><div><div class="cvl">Balance</div><div class="cvx" style="color:${pp.balance>=100?'var(--green)':'var(--red)'}">$${pp.balance.toFixed(2)}</div></div><div><div class="cvl">Equity</div><div class="cvx" style="color:${pp.equity>=100?'var(--green)':'var(--red)'}">$${pp.equity.toFixed(2)}</div></div><div><div class="cvl">P&L Total</div><div class="cvx" style="color:${total>=0?'var(--green)':'var(--red)'}">$${total.toFixed(2)}</div></div></div><div class="equity-bar"><div class="equity-fill" style="width:${Math.min(100,Math.max(0,pp.equity))}%;background:${pp.equity>=100?'var(--green)':'var(--red)'}"></div></div><div class="g3 tc" style="margin-top:8px"><div><div class="cvl">Trades</div><div class="cv">${pp.trades.length}</div></div><div><div class="cvl">Wins</div><div class="cv" style="color:var(--green)">${wins}</div></div><div><div class="cvl">Losses</div><div class="cv" style="color:var(--red)">${losses}</div></div></div>${pp.trades.length?`<div style="font-size:9px;color:var(--dim);margin-top:6px">Win rate: ${pp.trades.length?((wins/pp.trades.length)*100).toFixed(0):0}%</div>`:''}</div>`;
// Open trades
if(pp.openTrades.length){h+=`<div class="cl" style="margin-top:8px">POSICIONES ABIERTAS</div>`;pp.openTrades.forEach(t=>{const pd=t.dir==='BUY'?(S.gold-t.entry)*10:(t.entry-S.gold)*10;const pnl=pd*t.lot*10;h+=`<div class="trade-row open"><div><div style="font-size:11px;font-weight:700;color:${t.dir==='BUY'?'var(--green)':'var(--red)'}">${t.type.toUpperCase()} ${t.dir} ${t.lot}</div><div style="font-size:9px;color:var(--dim)">@ ${fC(t.entry)} | SL:${fC(t.sl)} TP:${fC(t.tp1)}</div></div><div style="text-align:right"><div class="${pnl>=0?'pnl-pos':'pnl-neg'}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</div><button onclick="closeTrade(${t.id},'manual',S.gold)" style="font-size:8px;background:var(--red);border:none;color:#fff;padding:2px 8px;border-radius:4px;cursor:pointer;margin-top:3px">CERRAR</button></div></div>`})}
// Trade history
if(pp.trades.length){h+=`<div class="cl" style="margin-top:12px">HISTORIAL (últimos 15)</div>`;pp.trades.slice(-15).reverse().forEach(t=>{h+=`<div class="trade-row ${t.pnl>=0?'win':'loss'}"><div><div style="font-size:10px;font-weight:700">${t.type} ${t.dir} ${t.lot}</div><div style="font-size:9px;color:var(--dim)">@ ${fC(t.entry)} → ${fC(t.closePrice)} (${t.status})</div></div><div class="${t.pnl>=0?'pnl-pos':'pnl-neg'}">${t.pnl>=0?'+':''}$${t.pnl.toFixed(2)}</div></div>`})}
h+=`<button onclick="if(confirm('Reset a $100?'))resetPaper()" style="width:100%;margin-top:12px;padding:10px;border-radius:8px;border:1px solid var(--border);background:0;color:var(--dim);font-family:inherit;font-size:10px;cursor:pointer">🔄 Reset Paper Account</button>`;
return h+'</div>'}

// NEWS
function rNW(){let h='<div class="fi">';if(S.news.length){const se=S.news.reduce((a,n)=>a+(n.impact==='positive'?1:n.impact==='negative'?-1:0),0);h+=`<div class="cl" style="margin-bottom:8px">NOTICIAS (${S.news.length}) <span style="color:var(--${se>0?'green':se<0?'red':'orange'})">${se>0?'BULL':se<0?'BEAR':'NEUTRAL'}</span></div>`;S.news.forEach(n=>h+=`<div class="ni ${n.impact==='positive'?'pos':n.impact==='negative'?'neg':''}" style="padding:10px"><div style="display:flex;justify-content:space-between;gap:8px"><div style="flex:1"><div style="font-size:11px;font-weight:700;line-height:1.3;margin-bottom:3px">${n.title}</div><div style="font-size:10px;color:var(--dim)">${n.summary||''}</div></div><span class="b ${n.impact==='positive'?'bg':n.impact==='negative'?'br':'by'}">${(n.impact||'').toUpperCase()}</span></div></div>`)}else{h+='<div class="emp">Ejecuta pipeline</div>';h+=`<button class="btn" onclick="runPP()">⚡ PIPELINE</button>`}return h+'</div>'}
</script>
</body>
</html>
