<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>XAU/USD — Scalp & Swing Command Center</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06090f">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06090f;--card:#0c1219;--border:#151e2d;--text:#b8c5d8;--dim:#4a5a72;--accent:#c9a84c;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b;--purple:#a855f7;--cyan:#06b6d4}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Menlo','Fira Code','JetBrains Mono',monospace;font-size:12px;max-width:460px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
#setup h1{font-size:14px;color:var(--accent);letter-spacing:3px;margin-bottom:4px}
#setup .sub{font-size:10px;color:var(--dim);margin-bottom:32px}
#setup input{width:100%;max-width:340px;padding:14px 16px;background:#0a1020;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;margin-bottom:12px;outline:none}
#setup input:focus{border-color:var(--accent)}
#setup button{width:100%;max-width:340px;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b6914);color:#000;font-family:inherit;font-size:12px;font-weight:800;letter-spacing:1px;cursor:pointer}
#setup .note{font-size:8px;color:var(--dim);margin-top:16px;max-width:320px;line-height:1.5}
#app{display:none;padding-bottom:80px}
.header{padding:14px 14px 10px;background:linear-gradient(180deg,#0a1020,var(--bg));border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.pair{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pair-label{color:var(--accent);font-size:10px;font-weight:800;letter-spacing:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700}
.badge-def{background:#111827;color:#94a3b8;border:1px solid #1e293b}
.badge-y{background:#422006;color:#fbbf24;border:1px solid #78350f}
.badge-g{background:#052e16;color:#4ade80;border:1px solid #14532d}
.badge-r{background:#350a0a;color:#f87171;border:1px solid #7f1d1d}
.badge-c{background:#083344;color:#22d3ee;border:1px solid #155e75}
.badge-p{background:#2e1065;color:#c084fc;border:1px solid #4c1d95}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-live{background:var(--green);box-shadow:0 0 6px var(--green)}.dot-wait{background:var(--orange)}
.price{font-size:26px;font-weight:800;color:#fff;margin-top:4px;letter-spacing:-0.5px}
.change{font-size:11px;margin-top:2px}.meta{font-size:8px;color:var(--dim)}
.tabs{display:flex;gap:3px;margin-top:10px}
.tabs button{flex:1;padding:6px 2px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:var(--dim);font-size:8px;font-weight:700;letter-spacing:.8px;font-family:inherit;border-bottom:2px solid transparent}
.tabs button.active{background:rgba(201,168,76,.13);color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:10px 12px}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.card-label{font-size:9px;color:var(--dim);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.chart-wrap{position:relative;height:70px;background:#080d15;border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}
.chart-label{font-size:9px;color:var(--dim);letter-spacing:1.5px;font-weight:600;margin-bottom:4px}
.chart-hi,.chart-lo{position:absolute;font-size:8px;color:var(--dim);left:6px}
.chart-hi{top:4px}.chart-lo{bottom:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.cell{padding:8px;background:#080d15;border-radius:6px}
.cell-label{font-size:8px;color:var(--dim)}.cell-val{font-size:14px;font-weight:700}.cell-val-lg{font-size:16px;font-weight:800}
.text-center{text-align:center}
.pbar{height:6px;background:#111827;border-radius:3px;overflow:hidden;margin:3px 0}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s}
.zone-row{display:flex;justify-content:space-between;padding:4px 8px;border-radius:4px;margin-bottom:3px}
.news-item{border-left:3px solid var(--orange);padding:10px;margin-bottom:8px;border-radius:0 12px 12px 0;background:var(--card);border-right:1px solid var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.news-item.pos{border-left-color:var(--green)}.news-item.neg{border-left-color:var(--red)}
.btn-main{width:100%;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#8b6914);color:#000;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:1px;margin-bottom:12px}
.btn-main:disabled{background:var(--border);color:var(--dim);cursor:not-allowed}
.pipeline{margin-bottom:16px}
.pipe-step{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:4px;background:var(--card);border:1px solid var(--border)}
.pipe-step.active{border-color:var(--accent);background:#0f1520}
.pipe-step.done{border-color:var(--green);background:#052e1611}
.pipe-step.error{border-color:var(--red);background:#350a0a11}
.pipe-step.retrying{border-color:var(--orange);background:#42200611}
.pipe-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.pipe-icon.pending{background:#111827;color:var(--dim)}.pipe-icon.active{background:var(--accent);color:#000}
.pipe-icon.done{background:var(--green);color:#fff}.pipe-icon.error{background:var(--red);color:#fff}
.pipe-icon.retrying{background:var(--orange);color:#000}
.pipe-label{flex:1}.pipe-name{font-size:10px;font-weight:700}.pipe-status{font-size:8px;color:var(--dim);margin-top:1px}
.level-row{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;margin-bottom:3px;border-radius:4px}
.catalyst{font-size:10px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--border)}
.disclaimer{padding:12px 16px;text-align:center;font-size:8px;color:var(--dim);line-height:1.4}
.empty{text-align:center;padding:40px 20px;color:var(--dim)}
.sdiv{display:flex;align-items:center;gap:8px;margin:16px 0 10px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.sdiv::before,.sdiv::after{content:'';flex:1;height:1px;background:var(--border)}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .3s ease-out}
</style>
</head>
<body>
<div id="setup">
  <div style="font-size:36px;margin-bottom:16px">⚡</div>
  <h1>XAU/USD COMMAND CENTER</h1>
  <div class="sub">SCALP & SWING — 150 to 500 PIPS</div>
  <input id="tdKey" type="text" placeholder="TwelveData API Key" autocomplete="off">
  <input id="aiKey" type="password" placeholder="Anthropic API Key (sk-ant-...)" autocomplete="off">
  <button onclick="initApp()">INICIAR COMMAND CENTER</button>
  <div class="note">Keys guardadas en localStorage. Solo llamadas directas a cada API desde tu dispositivo.</div>
</div>
<div id="app">
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div class="pair"><span class="pair-label">XAU/USD</span><span class="badge badge-c">SCALP</span><span class="badge badge-p">SWING</span><span class="badge badge-y">150-500P</span><span class="dot" id="sDot"></span><span id="sTxt" style="font-size:7px"></span></div>
        <div class="price" id="pM">—</div>
        <div class="change" id="cI"></div>
      </div>
      <div style="text-align:right"><div class="meta">XM 500:1</div><div class="meta" id="lU"></div></div>
    </div>
    <div class="tabs" id="tB"><button class="active" data-tab="overview">OVERVIEW</button><button data-tab="tech">TÉCNICO</button><button data-tab="ai">AI PLAN</button><button data-tab="news">NEWS</button></div>
  </div>
  <div class="content" id="ct"></div>
  <div class="disclaimer">⚠️ No es asesoría financiera. Trading conlleva riesgo. Análisis IA orientativos.</div>
</div>
<script>
const S={tdKey:'',aiKey:'',gold:null,q:null,st:'wait',c5m:[],c15m:[],c1h:[],c4h:[],cD:[],cW:[],corr:{btc:null,oil:null},tab:'overview',plan:null,loading:false,err:null,news:[],lu:null,
pp:{running:false,ph:[
{id:'quote',n:'Precio XAU/USD',s:'p',r:0,mx:5},
{id:'c5m',n:'Velas 5M (80)',s:'p',r:0,mx:5},
{id:'c15m',n:'Velas 15M (80)',s:'p',r:0,mx:5},
{id:'c1h',n:'Velas 1H (100)',s:'p',r:0,mx:5},
{id:'c4h',n:'Velas 4H (80)',s:'p',r:0,mx:5},
{id:'cD',n:'Velas Daily (120)',s:'p',r:0,mx:5},
{id:'cW',n:'Velas Weekly (52)',s:'p',r:0,mx:5},
{id:'corr',n:'Correlaciones',s:'p',r:0,mx:5},
{id:'news',n:'Noticias macro',s:'p',r:0,mx:10},
{id:'plan',n:'Plan IA Scalp & Swing',s:'p',r:0,mx:10}
],cp:0}};
let Q=[],BY=false;
function enq(u,cb){Q.push({u,cb})}setInterval(()=>{if(BY||!Q.length)return;BY=true;const{u,cb}=Q.shift();fetch(u).then(r=>r.json()).then(d=>cb(d)).catch(()=>cb(null)).finally(()=>setTimeout(()=>BY=false,8500))},1200);
const TD=e=>`https://api.twelvedata.com/${e}&apikey=${S.tdKey}`;
const fC=n=>n?`$${n.toFixed(2)}`:'—';const tP=(a,b)=>Math.abs(a-b)*10;
const pC=d=>d&&d.values?d.values.reverse().map(v=>({t:new Date(v.datetime).getTime(),o:+v.open,h:+v.high,l:+v.low,c:+v.close})):null;
function RSI(c,p=14){if(c.length<p+1)return null;let g=0,l=0;for(let i=c.length-p;i<c.length;i++){const d=c[i].c-c[i-1].c;d>0?g+=d:l-=d}const a=g/p,b=l/p;return b===0?100:100-100/(1+a/b)}
function EMA(d,p){const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e}
function MACD(c){if(c.length<26)return null;const p=c.map(x=>x.c),m=EMA(p,12)-EMA(p,26),s=EMA(p.slice(-9),9)-EMA(p.slice(-26),26);return{m,s,h:m-s*.7}}
function ATR(c,p=14){if(c.length<p+1)return null;let s=0;for(let i=c.length-p;i<c.length;i++)s+=Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c));return s/p}
function BB(c,p=20){if(c.length<p)return null;const sl=c.slice(-p).map(c=>c.c),m=sl.reduce((a,b)=>a+b,0)/p,sd=Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/p);return{u:m+2*sd,m,l:m-2*sd,w:(4*sd/m)*100}}
function STOCH(c,p=14){if(c.length<p)return null;const sl=c.slice(-p),h=Math.max(...sl.map(c=>c.h)),l=Math.min(...sl.map(c=>c.l));return h===l?50:((sl[sl.length-1].c-l)/(h-l))*100}
function SR(c){if(c.length<10)return{S:[],R:[]};const mn=Math.min(...c.map(c=>c.l)),mx=Math.max(...c.map(c=>c.h)),r=mx-mn;return{S:[mn+r*.05,mn+r*.236,mn+r*.382],R:[mn+r*.618,mn+r*.786,mn+r*.95]}}
function SZ(c){if(c.length<20)return{d:[],s:[]};const d=[],s=[];for(let i=2;i<c.length-2;i++){if(c[i].l<c[i-1].l&&c[i].l<c[i-2].l&&c[i].l<c[i+1].l&&c[i].l<c[i+2].l)d.push({p:c[i].l,st:c[i+1].c>c[i].h?2:1});if(c[i].h>c[i-1].h&&c[i].h>c[i-2].h&&c[i].h>c[i+1].h&&c[i].h>c[i+2].h)s.push({p:c[i].h,st:c[i+1].c<c[i].l?2:1})}return{d:d.slice(-4),s:s.slice(-4)}}
function VWAP(c){if(c.length<10)return null;let cm=0,cv=0;c.slice(-20).forEach(x=>{const tp=(x.h+x.l+x.c)/3,v=x.h-x.l;cm+=tp*v;cv+=v});return cv>0?cm/cv:null}
function initApp(){const k=document.getElementById('tdKey').value.trim(),a=document.getElementById('aiKey').value.trim();if(!k||!a){alert('Necesitas ambas keys');return}S.tdKey=k;S.aiKey=a;localStorage.setItem('td_key',k);localStorage.setItem('ai_key',a);document.getElementById('setup').style.display='none';document.getElementById('app').style.display='block';setupTabs();R();setInterval(()=>{if(!S.pp.running)enq(TD('price?symbol=XAU/USD'),d=>{if(d?.price){S.gold=+d.price;S.st='live';S.lu=new Date();R()}})},30000)}
window.addEventListener('DOMContentLoaded',()=>{const k=localStorage.getItem('td_key');if(k)document.getElementById('tdKey').value=k;const a=localStorage.getItem('ai_key');if(a)document.getElementById('aiKey').value=a});
function setupTabs(){document.querySelectorAll('#tB button').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;document.querySelectorAll('#tB button').forEach(x=>x.classList.remove('active'));b.classList.add('active');R()}))}
async function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function resetPP(){S.pp.cp=0;S.pp.ph.forEach(p=>{p.s='p';p.r=0;p.le=null;p.ws=0});S.plan=null;S.err=null;S.news=[]}
async function runPP(){
  if(S.pp.running)return;S.pp.running=true;resetPP();S.loading=true;R();
  for(let i=0;i<S.pp.ph.length;i++){
    S.pp.cp=i;const ph=S.pp.ph[i];ph.s='a';R();let ok=false;
    while(!ok&&ph.r<=ph.mx){
      try{await execPh(ph.id);ph.s='d';ok=true}catch(e){
        ph.r++;if(ph.r>ph.mx){ph.s='e';ph.le=e.message;S.err=`"${ph.n}" falló tras ${ph.mx} reintentos: ${e.message}`;S.pp.running=false;S.loading=false;R();return}
        ph.s='r';ph.le=e.message;const rl=e.message==='RATE_LIMIT'||e.message.includes('429');ph.ws=rl?Math.min(65,20+ph.r*15):Math.min(20,3+ph.r*3);R();await sleep(ph.ws*1000);ph.s='a';R()
      }
    }R();if(i<S.pp.ph.length-1)await sleep(1500)
  }
  S.pp.running=false;S.loading=false;S.st='live';S.lu=new Date();S.tab='ai';
  document.querySelectorAll('#tB button').forEach(b=>{b.classList.remove('active');if(b.dataset.tab==='ai')b.classList.add('active')});R()
}
async function execPh(id){
  if(id==='quote'){const r=await fetch(TD('quote?symbol=XAU/USD'));const d=await r.json();if(d.code||!d.close)throw new Error(d.message||'No quote');S.gold=+d.close;S.q={o:+d.open,h:+d.high,l:+d.low,c:+d.close,p:+d.previous_close,ch:+d.change,chp:+d.percent_change};S.st='live';S.lu=new Date()}
  else if(id==='corr'){const r=await fetch(TD('price?symbol=BTC/USD,XBR/USD'));const d=await r.json();if(!d||d.code)throw new Error('No corr');if(d['BTC/USD']?.price)S.corr.btc=+d['BTC/USD'].price;if(d['XBR/USD']?.price)S.corr.oil=+d['XBR/USD'].price;if(!S.corr.btc&&!S.corr.oil)throw new Error('Empty')}
  else if(id==='news'){return phNews()}
  else if(id==='plan'){return phPlan()}
  else{const map={c5m:['5min',80],c15m:['15min',80],c1h:['1h',100],c4h:['4h',80],cD:['1day',120],cW:['1week',52]};const[iv,sz]=map[id];const r=await fetch(TD(`time_series?symbol=XAU/USD&interval=${iv}&outputsize=${sz}`));const d=await r.json();if(d.code)throw new Error(d.message||'Err');const p=pC(d);if(!p||p.length<10)throw new Error(`${p?p.length:0} candles`);S[id]=p}
}
async function cAI(prompt,mt=1500,ws=false){
  const body={model:'claude-sonnet-4-20250514',max_tokens:mt,messages:[{role:'user',content:prompt}]};
  if(ws)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.aiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));if(r.status===429)throw new Error('RATE_LIMIT');throw new Error(e.error?.message||`HTTP ${r.status}`)}
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||''
}
async function phNews(){
  const t=await cAI('Search for the very latest news affecting gold XAU/USD RIGHT NOW. Fed, CPI, NFP, USD/DXY, bonds, central bank gold, geopolitics, wars, tariffs, oil. Return ONLY JSON array: [{"title":"str","impact":"positive"|"negative"|"neutral","summary":"1 sentence","weight":"high"|"medium"|"low","timeframe":"immediate"|"this_week"|"ongoing"}]. Max 10.',1000,true);
  const p=JSON.parse(t.replace(/```json|```/g,'').trim());if(!Array.isArray(p)||!p.length)throw new Error('No news');S.news=p
}
async function phPlan(){
  if(!S.gold||S.cD.length<20)throw new Error('No data');
  const t=`PRECIO: $${S.gold.toFixed(2)} | ${new Date().toISOString()}
=SCALP TFs=
5M: RSI=${RSI(S.c5m)?.toFixed(1)}, ATR=${ATR(S.c5m)?.toFixed(2)}(${(ATR(S.c5m)*10)?.toFixed(0)}p)
15M: RSI=${RSI(S.c15m)?.toFixed(1)}, MACD_h=${MACD(S.c15m)?.h?.toFixed(2)}, ATR=${(ATR(S.c15m)*10)?.toFixed(0)}p
1H: RSI=${RSI(S.c1h)?.toFixed(1)}, MACD_h=${MACD(S.c1h)?.h?.toFixed(2)}, ATR=${(ATR(S.c1h)*10)?.toFixed(0)}p, Stoch=${STOCH(S.c1h)?.toFixed(1)}, BB_w=${BB(S.c1h)?.w?.toFixed(2)}%
1H SR: S=${SR(S.c1h).S.map(s=>s.toFixed(2))} R=${SR(S.c1h).R.map(r=>r.toFixed(2))}
1H Demand: ${SZ(S.c1h).d.map(z=>'$'+z.p.toFixed(2)).join(',')||'none'}
1H Supply: ${SZ(S.c1h).s.map(z=>'$'+z.p.toFixed(2)).join(',')||'none'}
VWAP_1H: ${VWAP(S.c1h)?'$'+VWAP(S.c1h).toFixed(2):'N/A'}
=SWING TFs=
4H: RSI=${RSI(S.c4h)?.toFixed(1)}, MACD_h=${MACD(S.c4h)?.h?.toFixed(2)}, ATR=${(ATR(S.c4h)*10)?.toFixed(0)}p
D: RSI=${RSI(S.cD)?.toFixed(1)}, MACD_h=${MACD(S.cD)?.h?.toFixed(2)}, ATR=${(ATR(S.cD)*10)?.toFixed(0)}p, Stoch=${STOCH(S.cD)?.toFixed(1)}, BB_w=${BB(S.cD)?.w?.toFixed(2)}%
W: RSI=${RSI(S.cW)?.toFixed(1)}, ATR=${(ATR(S.cW)*10)?.toFixed(0)}p
D SR: S=${SR(S.cD).S.map(s=>s.toFixed(2))} R=${SR(S.cD).R.map(r=>r.toFixed(2))}
W SR: S=${SR(S.cW).S.map(s=>s.toFixed(2))} R=${SR(S.cW).R.map(r=>r.toFixed(2))}
D Demand: ${SZ(S.cD).d.map(z=>'$'+z.p.toFixed(2)).join(',')||'none'}
D Supply: ${SZ(S.cD).s.map(z=>'$'+z.p.toFixed(2)).join(',')||'none'}
D range5: ${S.cD.slice(-5).map(c=>((c.h-c.l)*10).toFixed(0)+'p').join(',')}
W range4: ${S.cW.slice(-4).map(c=>((c.h-c.l)*10).toFixed(0)+'p').join(',')}`;
  const nc=S.news.length?'\n=NEWS=\n'+S.news.map(n=>`[${n.impact}][${n.weight}] ${n.title}: ${n.summary}`).join('\n'):'';
  const txt=await cAI(`Eres analista XAU/USD. Plan ACCIONABLE para AHORA MISMO. Sistema dual scalp+swing.
${t}${nc}
SOLO JSON (sin markdown):
{"timestamp":"ISO","market_phase":"trending_up"|"trending_down"|"ranging"|"volatile"|"breakout","overall_bias":"BULLISH"|"BEARISH"|"NEUTRAL","bias_strength":1-10,"confidence":1-100,
"immediate_action":"WAIT"|"BUY_NOW"|"SELL_NOW"|"SCALP_BUY"|"SCALP_SELL","immediate_reason":"que hacer AHORA",

// RENDER
function R(){
  const d=document.getElementById('sDot'),t=document.getElementById('sTxt');
  if(d)d.className='dot '+(S.st==='live'?'dot-live':'dot-wait');
  if(t){t.textContent=S.st==='live'?'LIVE':'...';t.style.color=S.st==='live'?'var(--green)':'var(--orange)'}
  document.getElementById('pM').textContent=S.gold?fC(S.gold):'—';
  const ci=document.getElementById('cI');
  if(ci&&S.q){const u=S.q.ch>=0;ci.innerHTML=`<span style="color:var(--${u?'green':'red'})">${u?'▲':'▼'} ${S.q.ch?.toFixed(2)} (${S.q.chp?.toFixed(2)}%)</span><span style="color:var(--dim);font-size:9px;margin-left:8px">H ${fC(S.q.h)} · L ${fC(S.q.l)}</span>`}
  const lu=document.getElementById('lU');if(lu&&S.lu)lu.textContent=S.lu.toLocaleTimeString();
  const el=document.getElementById('ct');if(!el)return;
  if(S.tab==='overview')el.innerHTML=rOV();else if(S.tab==='tech')el.innerHTML=rTE();else if(S.tab==='ai')el.innerHTML=rAI();else if(S.tab==='news')el.innerHTML=rNW()
}
function rPP(){let h='<div class="pipeline">';S.pp.ph.forEach((p,i)=>{const ic=p.s==='d'?'done':p.s==='e'?'error':p.s==='r'?'retrying':p.s==='a'?'active':'pending';const ico=p.s==='d'?'✓':p.s==='e'?'✗':p.s==='r'?'↻':p.s==='a'?'<span class="spin">◌</span>':(i+1);let st='Pendiente';if(p.s==='a')st='Ejecutando...';else if(p.s==='d')st='✓';else if(p.s==='r')st=`Retry ${p.r}/${p.mx} ${p.ws}s`;else if(p.s==='e')st=(p.le||'').slice(0,40);h+=`<div class="pipe-step ${p.s==='a'?'active':p.s==='d'?'done':p.s==='e'?'error':p.s==='r'?'retrying':''}"><div class="pipe-icon ${ic}">${ico}</div><div class="pipe-label"><div class="pipe-name">${p.n}</div><div class="pipe-status" style="color:${p.s==='d'?'var(--green)':p.s==='e'?'var(--red)':p.s==='r'?'var(--orange)':'var(--dim)'}">${st}</div></div></div>`});return h+'</div>'}
function svg(data,h,id){if(!data||data.length<5)return'';const pr=data.map(c=>c.c),mn=Math.min(...pr),mx=Math.max(...pr),rn=mx-mn||1,up=pr[pr.length-1]>=pr[0],cl=up?'var(--green)':'var(--red)',ln=pr.map((p,i)=>(i?'L':'M')+`${i},${h-((p-mn)/rn)*(h-8)-4}`).join(' ');return`<svg width="100%" height="${h}" viewBox="0 0 ${pr.length} ${h}" preserveAspectRatio="none"><defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${cl}" stop-opacity=".3"/><stop offset="100%" stop-color="${cl}" stop-opacity="0"/></linearGradient></defs><path d="${ln}L${pr.length-1},${h}L0,${h}Z" fill="url(#g${id})"/><path d="${ln}" fill="none" stroke="${cl}" stroke-width="1.5"/></svg>`}
function chB(data,h,label,id){if(!data||data.length<5)return'';const pr=data.map(c=>c.c);return`<div class="chart-label">${label}</div><div class="chart-wrap" style="height:${h}px">${svg(data,h,id)}<div class="chart-hi">${fC(Math.max(...pr))}</div><div class="chart-lo">${fC(Math.min(...pr))}</div></div>`}
function rOV(){
  let h='<div class="fade-in">';
  h+=`<button class="btn-main" onclick="runPP()" ${S.pp.running?'disabled':''}>${S.pp.running?'<span class="spin">◌</span> ANALIZANDO...':'⚡ ANALIZAR — SCALP & SWING'}</button>`;
  if(S.pp.running||S.pp.ph.some(p=>p.s!=='p'))h+=rPP();
  if(S.err)h+=`<div class="card" style="border-color:rgba(239,68,68,.3);background:#1a0a0a"><div style="color:var(--red);font-size:11px">❌ ${S.err}</div></div>`;
  if(S.c5m.length>5){
    h+='<div class="sdiv" style="color:var(--cyan)">Scalping TFs</div>';
    h+=chB(S.c5m.slice(-40),50,'5M','5m')+chB(S.c15m.slice(-40),50,'15M','15m')+chB(S.c1h.slice(-50),60,'1H','1h');
    h+='<div class="sdiv" style="color:var(--purple)">Swing TFs</div>';
    h+=chB(S.c4h.slice(-40),60,'4H','4h')+chB(S.cD.slice(-60),60,'DAILY','d')+chB(S.cW.slice(-30),50,'WEEKLY','w');
  }
  const a1=ATR(S.c1h),a4=ATR(S.c4h),aD=ATR(S.cD),aW=ATR(S.cW);
  if(a1)h+=`<div class="card"><div class="card-label">ATR</div><div class="grid4">${[{l:'1H',v:a1,c:'cyan'},{l:'4H',v:a4,c:'blue'},{l:'D',v:aD,c:'orange'},{l:'W',v:aW,c:'purple'}].map(x=>`<div class="text-center"><div class="cell-label">${x.l}</div><div class="cell-val" style="color:var(--${x.c})">${x.v?(x.v*10).toFixed(0)+'p':'—'}</div></div>`).join('')}</div></div>`;
  if(S.corr.btc||S.corr.oil)h+=`<div class="card"><div class="card-label">CORRELACIONES</div><div class="grid2"><div class="cell"><div class="cell-label">BTC</div><div class="cell-val">${S.corr.btc?'$'+S.corr.btc.toFixed(0):'—'}</div></div><div class="cell"><div class="cell-label">OIL</div><div class="cell-val">${S.corr.oil?'$'+S.corr.oil.toFixed(2):'—'}</div></div></div></div>`;
  return h+'</div>'}
function rTE(){
  if(S.cD.length<10)return'<div class="empty">Ejecuta el pipeline primero</div>';
  const rb=(l,v)=>{const c=v>70?'var(--red)':v<30?'var(--green)':'var(--blue)';return`<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--dim)">${l}</span><span style="font-size:12px;font-weight:700;color:${v>70?'var(--red)':v<30?'var(--green)':'var(--text)'}">${v?v.toFixed(1):'—'}</span></div><div class="pbar"><div class="pbar-fill" style="width:${v||0}%;background:${c}"></div></div></div>`};
  let h='<div class="fade-in">';
  h+=`<div class="card"><div class="card-label">RSI ALL TFs</div>${rb('5M',RSI(S.c5m))}${rb('15M',RSI(S.c15m))}${rb('1H',RSI(S.c1h))}${rb('4H',RSI(S.c4h))}${rb('D',RSI(S.cD))}${rb('W',RSI(S.cW))}</div>`;
  h+=`<div class="card"><div class="card-label">MACD HIST</div><div class="grid4 text-center">${[{l:'15M',v:MACD(S.c15m)},{l:'1H',v:MACD(S.c1h)},{l:'4H',v:MACD(S.c4h)},{l:'D',v:MACD(S.cD)}].map(x=>`<div><div class="cell-label">${x.l}</div><div style="font-size:12px;font-weight:700;color:var(--${x.v?.h>0?'green':'red'})">${x.v?x.v.h.toFixed(2):'—'}</div></div>`).join('')}</div></div>`;
  const b1=BB(S.c1h);if(b1)h+=`<div class="card"><div class="card-label">BB 1H</div><div class="grid3 text-center"><div><div class="cell-label">U</div><div class="cell-val" style="color:var(--red)">${fC(b1.u)}</div></div><div><div class="cell-label">M</div><div class="cell-val">${fC(b1.m)}</div></div><div><div class="cell-label">L</div><div class="cell-val" style="color:var(--green)">${fC(b1.l)}</div></div></div><div style="margin-top:4px;font-size:9px;color:var(--dim)">W:${b1.w.toFixed(2)}%${b1.w<1.5?' ⚡SQUEEZE':b1.w>3?' 🔥WIDE':''}</div></div>`;
  const z1=SZ(S.c1h),zD=SZ(S.cD);
  const zoneCard=(label,z)=>`<div class="card"><div class="card-label">ZONAS ${label}</div><div style="margin-bottom:6px"><div style="font-size:9px;color:var(--green);font-weight:700;margin-bottom:3px">▼ DEMAND</div>${z.d.length?z.d.map(x=>`<div class="zone-row" style="background:#052e1622"><span style="color:var(--green);font-weight:700">${fC(x.p)}</span><span style="font-size:9px;color:var(--dim)">${S.gold?tP(S.gold,x.p).toFixed(0)+'p':''}</span></div>`).join(''):'—'}</div><div><div style="font-size:9px;color:var(--red);font-weight:700;margin-bottom:3px">▲ SUPPLY</div>${z.s.length?z.s.map(x=>`<div class="zone-row" style="background:#350a0a22"><span style="color:var(--red);font-weight:700">${fC(x.p)}</span><span style="font-size:9px;color:var(--dim)">${S.gold?tP(S.gold,x.p).toFixed(0)+'p':''}</span></div>`).join(''):'—'}</div></div>`;
  h+=zoneCard('1H',z1)+zoneCard('DAILY',zD);
  const vw=VWAP(S.c1h);if(vw)h+=`<div class="card"><div class="card-label">VWAP 1H</div><div style="font-size:18px;font-weight:800;color:${S.gold>vw?'var(--green)':'var(--red)'}">${fC(vw)}</div><div style="font-size:9px;color:var(--dim)">Precio ${S.gold>vw?'ARRIBA':'DEBAJO'} (${S.gold?tP(S.gold,vw).toFixed(0)+'p':''})</div></div>`;
  return h+'</div>'}
function rAI(){
  const p=S.plan,bc=b=>b==='BULLISH'?'var(--green)':b==='BEARISH'?'var(--red)':'var(--orange)';
  let h='<div class="fade-in">';
  h+=`<button class="btn-main" onclick="runPP()" ${S.pp.running?'disabled':''}>${S.pp.running?'<span class="spin">◌</span> ANALIZANDO...':'⚡ NUEVO ANÁLISIS'}</button>`;
  if(S.pp.running||S.pp.ph.some(x=>x.s!=='p'&&!S.plan))h+=rPP();
  if(S.err)h+=`<div class="card" style="border-color:rgba(239,68,68,.3);background:#1a0a0a"><div style="color:var(--red);font-size:11px">❌ ${S.err}</div></div>`;
  if(p){
    const ac=p.immediate_action?.includes('BUY')?'var(--green)':p.immediate_action?.includes('SELL')?'var(--red)':'var(--orange)';
    h+=`<div class="card" style="border:2px solid ${ac};background:${ac}11"><div class="card-label" style="color:${ac}">⚡ ACCIÓN INMEDIATA</div><div style="font-size:18px;font-weight:800;color:${ac};margin-bottom:4px">${(p.immediate_action||'').replace(/_/g,' ')}</div><div style="font-size:11px;line-height:1.4">${p.immediate_reason||''}</div></div>`;

    if(p.scalp_plan?.active){const s=p.scalp_plan,ib=s.direction==='BUY',tc=ib?'var(--green)':'var(--red)';

      h+=`<div class="card" style="border-left:3px solid var(--cyan)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="font-size:16px;font-weight:800;color:${tc}">${ib?'🟢':'🔴'} ${s.direction}</div><div><span class="badge badge-c">${s.timeframe||''}</span> <span class="badge badge-def">${s.hold_time||''}</span></div></div>`;

      h+=`<div class="grid2" style="margin-bottom:8px">${[{l:'TP1',v:s.tp1,pp:s.tp1_pips},{l:'TP2',v:s.tp2,pp:s.tp2_pips}].map(x=>`<div class="cell text-center"><div class="cell-label" style="color:var(--green)">${x.l}</div><div style="font-size:13px;font-weight:700;color:var(--green)">${fC(x.v)}</div><div style="font-size:9px;color:var(--accent)">${x.pp?x.pp+'p':''}</div></div>`).join('')}</div>`;
      if(s.trigger)h+=`<div style="font-size:10px;color:var(--cyan);margin-bottom:4px">🎯 ${s.trigger}</div>`;

      h+=`<div style="font-size:10px;color:var(--dim)">R:R <span style="color:var(--accent);font-weight:700">${s.risk_reward||''}</span></div><div style="font-size:10px;margin-top:4px;line-height:1.4">${s.rationale||''}</div></div>`}
    if(p.swing_plan?.active){const sw=p.swing_plan,ib=sw.direction==='BUY',tc=ib?'var(--green)':'var(--red)';
      h+='<div class="sdiv" style="color:var(--purple)">🎯 Swing</div>';
      h+=`<div class="card" style="border-left:3px solid var(--purple)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div style="font-size:16px;font-weight:800;color:${tc}">${ib?'🟢':'🔴'} ${sw.direction}</div><span class="badge badge-p">${sw.horizon||''}</span></div>`;
      h+=`<div class="grid2" style="margin-bottom:8px"><div class="cell"><div class="cell-label">ENTRY</div><div style="font-size:12px;font-weight:700">${fC(sw.entry_zone?.from)}-${fC(sw.entry_zone?.to)}</div></div><div class="cell"><div class="cell-label" style="color:var(--red)">SL</div><div style="font-size:12px;font-weight:700;color:var(--red)">${fC(sw.stop_loss)} (${sw.sl_pips||''}p)</div></div></div>`;
      h+=`<div class="grid3" style="margin-bottom:8px">${['tp1','tp2','tp3'].map((tp,i)=>`<div class="cell text-center"><div class="cell-label" style="color:var(--green)">TP${i+1}</div><div style="font-size:12px;font-weight:700;color:var(--green)">${fC(sw[tp])}</div><div style="font-size:9px;color:var(--accent)">${sw[tp+'_pips']?sw[tp+'_pips']+'p':''}</div></div>`).join('')}</div>`;
      h+=`<div style="font-size:10px;color:var(--dim)">R:R <span style="color:var(--accent);font-weight:700">${sw.risk_reward||''}</span></div><div style="font-size:10px;margin-top:4px;line-height:1.4">${sw.rationale||''}</div></div>`}
    if(p.scaling_plan?.use_scaling&&p.scaling_plan.scale_entries?.length){
      h+=`<div class="card"><div class="card-label" style="color:var(--accent)">📐 SCALING</div><div style="font-size:10px;margin-bottom:8px;line-height:1.3">${p.scaling_plan.description||''}</div>`;

    if(p.invalidation)h+=`<div class="card" style="border-color:rgba(239,68,68,.2)"><div class="card-label" style="color:var(--red)">⚠️ INVALIDACIÓN</div><div style="font-size:11px;line-height:1.4">${p.invalidation}</div></div>`;
    if(p.upcoming_catalysts?.length){h+=`<div class="card"><div class="card-label">CATALIZADORES</div>`;p.upcoming_catalysts.forEach(c=>h+=`<div class="catalyst">🔸 ${c}</div>`);h+='</div>'}
  }
  if(!p&&!S.loading&&!S.err)h+='<div class="empty"><div style="font-size:32px;margin-bottom:12px">⚡</div><div>Presiona para analizar</div></div>';
  return h+'</div>'}
function rNW(){
  let h='<div class="fade-in">';

  }else{h+='<div class="empty">Ejecuta el pipeline para noticias</div>';h+=`<button class="btn-main" onclick="runPP()" ${S.pp.running?'disabled':''}>⚡ PIPELINE</button>`}
